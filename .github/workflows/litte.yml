name: litte

on:
  push:
    paths:
      - '.github/workflows/litte.yml'
      - 'commit/**'
  schedule:
    - cron: 0 */4 * * *
  repository_dispatch:
  workflow_dispatch:
    inputs:
      packages:
        description: 'packages'
        required: false
        default: 'false'
      simulate_changes:
        description: 'simulate package version/hash changes for validation'
        required: false
        default: 'false'
      push_ref:
        description: 'target branch in kenzok8/litte'
        required: false
        default: 'master'

jobs:
  job_litte:
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id
    runs-on: ubuntu-latest

    name: Update litte
    strategy:
      fail-fast: false
      matrix:
        target: [master]

    steps:
    - name: Checkout
      uses: actions/checkout@main
      with:
        fetch-depth: 0

    - name: Initialization environment
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "action"
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: Clone packages
      run: |
        cd $GITHUB_WORKSPACE
        chmod +x .github/diy/${{matrix.target}}.sh
        git clone -b master https://github.com/kenzok8/litte.git ${{matrix.target}}
        cd ${{matrix.target}}
        find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

        $GITHUB_WORKSPACE/.github/diy/litte.sh
        bash /$GITHUB_WORKSPACE/.github/diy/convert_translation.sh
        bash /$GITHUB_WORKSPACE/.github/diy/create_acl_for_luci.sh -a
        bash /$GITHUB_WORKSPACE/.github/diy/Modify.sh

        if [ "${{ github.event.inputs.simulate_changes }}" = "true" ]; then
          echo "🔬 simulate package version/hash changes"
          for pkg in adguardhome ddns-go brook; do
            mk="$pkg/Makefile"
            [ -f "$mk" ] || continue
            sed -i -E 's/^(PKG_VERSION[[:space:]]*:?=).*/\1 99.99.99/' "$mk" || true
            sed -i -E 's/^(PKG_MIRROR_HASH[[:space:]]*:?=).*/\1 1111111111111111111111111111111111111111111111111111111111111111/' "$mk" || true
            sed -i -E 's/^(PKG_HASH[[:space:]]*:?=).*/\1 1111111111111111111111111111111111111111111111111111111111111111/' "$mk" || true
          done
        fi

    - name: Detect version-changed packages
      run: |
        cd $GITHUB_WORKSPACE/${{matrix.target}}
        : > /tmp/version_changed_packages.txt
        : > /tmp/package_version_map.txt

        get_ver() {
          local file="$1"
          awk '/^PKG_VERSION[[:space:]]*:=|^PKG_VERSION[[:space:]]*=|^LUCI_VERSION[[:space:]]*:=|^LUCI_VERSION[[:space:]]*=/{sub("^[^=]*=","",$0);gsub(/^[[:space:]]+|[[:space:]]+$/,"",$0);print;exit}' "$file"
        }

        changed_makefiles=$(git status --porcelain | sed -E 's/^.. //' | sed -E 's#^[^ ]+ -> ##' | grep -E '^[^/]+/Makefile$' || true)

        for makefile in $changed_makefiles; do
          [ -f "$makefile" ] || continue
          pkg=$(basename "$(dirname "$makefile")")
          new_ver=$(get_ver "$makefile")

          old_ver=""
          if git cat-file -e "HEAD:${makefile}" 2>/dev/null; then
            old_ver=$(git show "HEAD:${makefile}" | awk '/^PKG_VERSION[[:space:]]*:=|^PKG_VERSION[[:space:]]*=|^LUCI_VERSION[[:space:]]*:=|^LUCI_VERSION[[:space:]]*=/{sub("^[^=]*=","",$0);gsub(/^[[:space:]]+|[[:space:]]+$/,"",$0);print;exit}')
          fi

          if [ "$new_ver" != "$old_ver" ]; then
            echo "$pkg" >> /tmp/version_changed_packages.txt
            echo "$pkg|$new_ver" >> /tmp/package_version_map.txt
          fi
        done

        sort -u /tmp/version_changed_packages.txt -o /tmp/version_changed_packages.txt

    - name: 🚀 Upload
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        PUSH_REF: ${{ github.event.inputs.push_ref }}
      run: |
        cd $GITHUB_WORKSPACE/${{matrix.target}}

        git reset >/dev/null 2>&1 || true

        if ! git status --porcelain | grep . >/dev/null; then
          echo "ℹ️ nothing to commit"
          exit 0
        fi

        if [ -s /tmp/version_changed_packages.txt ]; then
          while read -r pkg; do
            [ -n "$pkg" ] && [ -d "$pkg" ] && git add "$pkg"
          done < /tmp/version_changed_packages.txt
        else
          changed_root_files=$(git status --porcelain | sed -E 's/^.. //' | sed -E 's#^[^ ]+ -> ##' | awk -F/ 'NF==1 {print $0}' || true)
          for f in $changed_root_files; do
            [ -n "$f" ] && git add "$f" || true
          done
        fi

        if git diff --cached --quiet; then
          echo "ℹ️ nothing to commit"
          exit 0
        fi

        changed_packages=$(git diff --cached --name-only -- . ':(exclude).github/**' | awk -F/ 'NF>1{print $1}' | sort -u)
        pkg_count=$(printf '%s\n' "$changed_packages" | sed '/^$/d' | wc -l | tr -d ' ')

        get_pkg_version() {
          local pkg="$1"
          if [ -s /tmp/package_version_map.txt ]; then
            awk -F'|' -v p="$pkg" '$1==p{print $2; exit}' /tmp/package_version_map.txt
            return 0
          fi
          echo ""
        }

        if [ "$pkg_count" -eq 0 ]; then
          commit_msg="📦 sync: refresh packages"
        elif [ "$pkg_count" -eq 1 ]; then
          pkg=$(printf '%s\n' "$changed_packages" | sed '/^$/d' | head -n1)
          ver=$(get_pkg_version "$pkg")
          if [ -n "$ver" ]; then
            commit_msg="📦 $pkg: update to $ver"
          else
            commit_msg="📦 $pkg: update to latest"
          fi
        elif [ "$pkg_count" -le 5 ]; then
          pkg_list=$(printf '%s\n' "$changed_packages" | sed '/^$/d' | paste -sd ',' -)
          commit_msg="📦 update: $pkg_list"
        else
          first_two=$(printf '%s\n' "$changed_packages" | sed '/^$/d' | head -n2 | paste -sd ',' -)
          more_count=$((pkg_count - 2))
          commit_msg="📦 update: $first_two and $more_count more"
        fi

        git commit -m "$commit_msg"
        target_ref="${PUSH_REF:-master}"
        git push --quiet "https://${{ secrets.ACCESS_TOKEN }}@github.com/kenzok8/litte.git" "HEAD:${target_ref}"
        echo "✅ 提交完成: $commit_msg"

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 1
