name: litte

on:
  push:
    paths:
      - '.github/workflows/litte.yml'
      - 'commit/**'
  schedule:
    - cron: 0 */4 * * *
  repository_dispatch:
  workflow_dispatch:
    inputs:
      packages:
        description: 'packages'
        required: false
        default: 'false'

jobs:
  job_litte:
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id
    runs-on: ubuntu-latest

    name: Update litte
    strategy:
      fail-fast: false
      matrix:
        target: [master]

    steps:
    - name: Checkout
      uses: actions/checkout@main
      with:
        fetch-depth: 0

    - name: Initialization environment
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "action"
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: Clone packages
      run: |
        cd $GITHUB_WORKSPACE
        chmod +x .github/diy/${{matrix.target}}.sh
        git clone -b master https://github.com/kenzok8/litte.git ${{matrix.target}}
        cd ${{matrix.target}}
        git rm -r --cache * >/dev/null 2>&1 &
        rm -rf `find ./* -maxdepth 0 -type d` >/dev/null 2>&1

        $GITHUB_WORKSPACE/.github/diy/litte.sh
        bash /$GITHUB_WORKSPACE/.github/diy/convert_translation.sh
        bash /$GITHUB_WORKSPACE/.github/diy/create_acl_for_luci.sh -a
        bash /$GITHUB_WORKSPACE/.github/diy/Modify.sh

    - name: 🧠 Generate commit messages by package version/upstream
      env:
        GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      run: |
        cd $GITHUB_WORKSPACE/${{matrix.target}}
        echo "🧪 Start generating package commit messages"
        : > /tmp/commit_messages.txt
        : > /tmp/commit_messages_version.txt
        : > /tmp/commit_links.txt
        : > /tmp/updated_packages.txt

        get_make_var() {
          local file="$1"
          local var="$2"
          awk -v v="$var" '
            $0 ~ "^" v "[[:space:]]*:=" || $0 ~ "^" v "[[:space:]]*=" {
              sub("^[^=]*=", "", $0)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0)
              print $0
              exit
            }
          ' "$file"
        }

        github_repo_from_url() {
          local url="$1"
          echo "$url" | sed -nE 's#.*github.com[:/]+([^/]+/[^/.]+)(\.git)?.*#\1#p' | head -1
        }

        fetch_upstream_subject() {
          local repo="$1"
          local sha="$2"
          local msg=""

          if [ -n "$repo" ] && [ -n "$sha" ] && [ ${#sha} -ge 7 ]; then
            msg=$(gh api "repos/${repo}/commits/${sha}" --jq '.commit.message // empty' 2>/dev/null || true)
          fi
          if [ -z "$msg" ] && [ -n "$repo" ]; then
            msg=$(gh api "repos/${repo}/commits?per_page=1" --jq '.[0].commit.message // empty' 2>/dev/null || true)
          fi

          case "$msg" in
            ""|null|"{"*|"["*|*"API rate limit exceeded"*|*"Bad credentials"*)
              msg=""
              ;;
          esac

          echo "$msg" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//'
        }

        append_last_commit_link() {
          local pkg="$1"
          local repo="$2"
          local sha="$3"
          if [ -n "$pkg" ] && [ -n "$repo" ] && [ -n "$sha" ] && [ ${#sha} -ge 7 ]; then
            echo "$pkg|https://github.com/${repo}/commit/${sha}" >> /tmp/commit_links.txt
          fi
        }

        random_emoji() {
          local Emoji=("🌸" "🐌" "🌿" "⛅" "🍂" "💦" "💤" "💭" "🍭" "🎉" "🎁" "🎈" "🐾" "🎨" "💋" "🍓" "🍕" "🍉" "🙈" "🤡" "🍡")
          echo "${Emoji[$((RANDOM % ${#Emoji[@]}))]}"
        }

        # 仅分析发生变化的 Makefile 对应包
        changed_makefiles=$(git diff --name-only HEAD -- . ':(exclude).github/**' | grep -E '^[^/]+/Makefile$' || true)

        for makefile in $changed_makefiles; do
          [ -f "$makefile" ] || continue
          pkg=$(basename "$(dirname "$makefile")")

          new_ver=$(get_make_var "$makefile" "PKG_VERSION")
          [ -z "$new_ver" ] && new_ver=$(get_make_var "$makefile" "LUCI_VERSION")
          new_src_ver=$(get_make_var "$makefile" "PKG_SOURCE_VERSION")
          new_src_url=$(get_make_var "$makefile" "PKG_SOURCE_URL")
          repo=$(github_repo_from_url "$new_src_url")

          old_ver=""
          old_src_ver=""
          if git cat-file -e "HEAD:${makefile}" 2>/dev/null; then
            old_content=$(git show "HEAD:${makefile}")
            old_ver=$(printf '%s\n' "$old_content" | awk '/^PKG_VERSION[[:space:]]*:=|^PKG_VERSION[[:space:]]*=|^LUCI_VERSION[[:space:]]*:=|^LUCI_VERSION[[:space:]]*=/{sub("^[^=]*=","",$0);gsub(/^[[:space:]]+|[[:space:]]+$/,"",$0);print;exit}')
            old_src_ver=$(printf '%s\n' "$old_content" | awk '/^PKG_SOURCE_VERSION[[:space:]]*:=|^PKG_SOURCE_VERSION[[:space:]]*=/{sub("^[^=]*=","",$0);gsub(/^[[:space:]]+|[[:space:]]+$/,"",$0);print;exit}')
          fi

          if [ -n "$new_ver" ] && [ "$new_ver" != "$old_ver" ]; then
            msg="$(random_emoji) $pkg: update to $new_ver"
            echo "$msg" >> /tmp/commit_messages.txt
            echo "$msg" >> /tmp/commit_messages_version.txt
            append_last_commit_link "$pkg" "$repo" "$new_src_ver"
            echo "$pkg" >> /tmp/updated_packages.txt
            continue
          fi

          # 仅做版本号更新提交，版本未变化时不纳入提交列表
          continue
        done

        sort -u /tmp/updated_packages.txt -o /tmp/updated_packages.txt

    - name: 🚀 Upload
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      run: |
        cd $GITHUB_WORKSPACE/${{matrix.target}}

        if git status --porcelain | grep .; then
          Emoji=("🌸" "🐌" "🌿" "⛅" "🍂" "💦" "💤" "💭" "🍭" "🎉" "🎁" "🎈" "🐾" "🎨" "💋" "🍓" "🍕" "🍉" "🙈" "🤡" "🍡")
          committed_any=0

          if [ ! -s /tmp/updated_packages.txt ]; then
            echo "ℹ️ no package-level Makefile updates detected"
            exit 0
          fi

          changed_pkgs=$(cat /tmp/updated_packages.txt)

          for pkg in $changed_pkgs; do
            [ -n "$pkg" ] || continue
            [ -d "$pkg" ] || continue

            git add "$pkg"
            if git diff --cached --quiet; then
              continue
            fi

            commit_msg=""
            if [ -s /tmp/commit_messages_version.txt ]; then
              commit_msg=$(awk -v p="$pkg" '$0 ~ ("^[^[:space:]]+[[:space:]]+" p ": ") {print; exit}' /tmp/commit_messages_version.txt)
            fi
            if [ -z "$commit_msg" ] && [ -s /tmp/commit_messages.txt ]; then
              commit_msg=$(awk -v p="$pkg" '$0 ~ ("^[^[:space:]]+[[:space:]]+" p ": ") {print; exit}' /tmp/commit_messages.txt)
            fi
            if [ -z "$commit_msg" ]; then
              random_emoji="${Emoji[$((RANDOM % ${#Emoji[@]}))]}"
              commit_msg="$random_emoji $pkg: sync upstream"
            fi

            url=""
            if [ -s /tmp/commit_links.txt ]; then
              url=$(awk -F'|' -v p="$pkg" '$1==p{print $2; exit}' /tmp/commit_links.txt)
            fi

            if [ -n "$url" ]; then
              git commit -m "$commit_msg" -m "$(printf '%b' "$pkg:\nlast commit: $url")"
            else
              git commit -m "$commit_msg"
            fi

            committed_any=1
            echo "✅ 提交完成: $commit_msg"
          done

          if [ "$committed_any" -eq 1 ]; then
            git push --quiet "https://${{ secrets.ACCESS_TOKEN }}@github.com/kenzok8/litte.git" HEAD:master
          else
            echo "ℹ️ nothing to commit"
            exit 0
          fi
        else
          echo "ℹ️ nothing to commit"
          exit 0
        fi || exit 0

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 1
