name: litte

on:
  push:
    paths:
      - '.github/workflows/litte.yml'
      - 'commit/**'
  schedule:
    - cron: 0 */4 * * *
  repository_dispatch:
  workflow_dispatch:
    inputs:
      packages:
        description: 'packages'
        required: false
        default: 'false'

jobs:
  job_litte:
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id
    runs-on: ubuntu-latest

    name: Update litte
    strategy:
      fail-fast: false
      matrix:
        target: [master]

    steps:
    - name: Checkout
      uses: actions/checkout@main
      with:
        fetch-depth: 0

    - name: Initialization environment
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "action"
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: Clone packages
      run: |
        cd $GITHUB_WORKSPACE
        chmod +x .github/diy/${{matrix.target}}.sh
        git clone -b master https://github.com/kenzok8/litte.git ${{matrix.target}}
        cd ${{matrix.target}}
        find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

        $GITHUB_WORKSPACE/.github/diy/litte.sh
        bash /$GITHUB_WORKSPACE/.github/diy/convert_translation.sh
        bash /$GITHUB_WORKSPACE/.github/diy/create_acl_for_luci.sh -a
        bash /$GITHUB_WORKSPACE/.github/diy/Modify.sh

    - name: Detect version-changed packages
      run: |
        cd $GITHUB_WORKSPACE/${{matrix.target}}
        : > /tmp/version_changed_packages.txt
        : > /tmp/package_version_map.txt

        # 从 Makefile 文件中提取版本号（支持 PKG_VERSION / LUCI_VERSION，支持 := 和 =）
        get_ver() {
          awk '/^(PKG_VERSION|LUCI_VERSION)[[:space:]]*:?=/{
            sub(/^[^=]*=[[:space:]]*/,""); gsub(/[[:space:]]+$/,""); print; exit
          }' "$1"
        }

        # 直接遍历所有 Makefile，不依赖 git status（避免漏掉 untracked 新包）
        for makefile in */Makefile; do
          [ -f "$makefile" ] || continue
          pkg=$(dirname "$makefile")
          new_ver=$(get_ver "$makefile")
          [ -z "$new_ver" ] && continue

          old_ver=""
          if git cat-file -e "HEAD:${makefile}" 2>/dev/null; then
            old_ver=$(git show "HEAD:${makefile}" | awk '/^(PKG_VERSION|LUCI_VERSION)[[:space:]]*:?=/{
              sub(/^[^=]*=[[:space:]]*/,""); gsub(/[[:space:]]+$/,""); print; exit
            }')
          fi

          if [ "$new_ver" != "$old_ver" ]; then
            echo "$pkg" >> /tmp/version_changed_packages.txt
            echo "$pkg|$new_ver" >> /tmp/package_version_map.txt
          fi
        done

        sort -u /tmp/version_changed_packages.txt -o /tmp/version_changed_packages.txt
        echo "版本变更包数量: $(wc -l < /tmp/version_changed_packages.txt)"
        cat /tmp/package_version_map.txt

    - name: 🚀 Upload
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      run: |
        cd $GITHUB_WORKSPACE/${{matrix.target}}

        # 全量 add，确保所有变更（新增/修改/删除）都被收录
        git add -A

        if git diff --cached --quiet; then
          echo "ℹ️ nothing to commit"
          exit 0
        fi

        get_pkg_version() {
          local pkg="$1"
          [ -s /tmp/package_version_map.txt ] || { echo ""; return; }
          awk -F'|' -v p="$pkg" '$1==p{print $2; exit}' /tmp/package_version_map.txt
        }

        # 从 staged 变更中提取顶层包目录名，排除 .github
        changed_packages=$(git diff --cached --name-only -- . ':(exclude).github/**' \
          | awk -F/ 'NF>1{print $1}' | sort -u)
        pkg_count=$(printf '%s\n' "$changed_packages" | sed '/^$/d' | wc -l | tr -d ' ')

        if [ "$pkg_count" -eq 0 ]; then
          commit_msg="📦 sync: refresh packages"

        elif [ "$pkg_count" -eq 1 ]; then
          pkg=$(printf '%s\n' "$changed_packages" | sed '/^$/d' | head -n1)
          ver=$(get_pkg_version "$pkg")
          if [ -n "$ver" ]; then
            commit_msg="📦 $pkg: update to $ver"
          else
            commit_msg="📦 $pkg: sync upstream"
          fi

        elif [ "$pkg_count" -le 5 ]; then
          # 2-5 个包：列出每个包及其版本号（有版本则附带，无则省略）
          pkg_ver_list=""
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            ver=$(get_pkg_version "$pkg")
            if [ -n "$ver" ]; then
              pkg_ver_list="${pkg_ver_list}${pkg}(${ver}), "
            else
              pkg_ver_list="${pkg_ver_list}${pkg}, "
            fi
          done <<< "$changed_packages"
          # 去掉末尾 ", "
          pkg_ver_list="${pkg_ver_list%, }"
          commit_msg="📦 update: $pkg_ver_list"

        else
          # 超过 5 个包：只列前 2 个 + 数量
          first_two=$(printf '%s\n' "$changed_packages" | sed '/^$/d' | head -n2 | paste -sd ',' -)
          more_count=$((pkg_count - 2))
          commit_msg="📦 update: $first_two and $more_count more"
        fi

        git commit -m "$commit_msg"
        git push --quiet "https://${{ secrets.ACCESS_TOKEN }}@github.com/kenzok8/litte.git" HEAD:master
        echo "✅ 提交完成: $commit_msg"

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 1
