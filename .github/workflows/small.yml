name: small

on:
  push:
    paths:
      - '.github/workflows/small.yml'
      - 'small.sh'
  schedule:
    - cron: 0 */4 * * *
  repository_dispatch:
  workflow_dispatch:
    inputs:
      packages:
        description: 'packages'
        required: false
        default: 'false'

jobs:
  job_small:
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id
    runs-on: ubuntu-latest

    name: Update small
    strategy:
      fail-fast: false
      matrix:
        target: [master]

    steps:
    - name: Checkout
      uses: actions/checkout@main
      with:
        fetch-depth: 0

    - name: Initialization environment
      run: |
        git config --global user.email "kenzok8@users.noreply.github.com"
        git config --global user.name "actions-user"
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: Clone packages
      run: |
        cd $GITHUB_WORKSPACE
        chmod +x .github/diy/small.sh
        git clone -b master https://github.com/kenzok8/small.git ${{matrix.target}}
        cd ${{matrix.target}}
        git rm -r --cache * >/dev/null 2>&1 &
        rm -rf `find ./* -maxdepth 0 -type d` >/dev/null 2>&1
        $GITHUB_WORKSPACE/.github/diy/small.sh
        bash /$GITHUB_WORKSPACE/.github/diy/convert_translation.sh
        bash /$GITHUB_WORKSPACE/.github/diy/create_acl_for_luci.sh -a
        bash /$GITHUB_WORKSPACE/.github/diy/Modify.sh

    - name: Generate commit messages by package version/upstream
      env:
        GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      run: |
        cd $GITHUB_WORKSPACE/${{matrix.target}}
        : > /tmp/commit_messages.txt
        : > /tmp/commit_links.txt

        get_make_var() {
          local file="$1"
          local var="$2"
          awk -v v="$var" '
            $0 ~ "^" v "[[:space:]]*:=" || $0 ~ "^" v "[[:space:]]*=" {
              sub("^[^=]*=", "", $0)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0)
              print $0
              exit
            }
          ' "$file"
        }

        github_repo_from_url() {
          local url="$1"
          echo "$url" | sed -nE 's#.*github.com[:/]+([^/]+/[^/.]+)(\.git)?.*#\1#p' | head -1
        }

        fetch_upstream_subject() {
          local repo="$1"
          local sha="$2"
          local msg=""

          if [ -n "$repo" ] && [ -n "$sha" ] && [ ${#sha} -ge 7 ]; then
            msg=$(gh api "repos/${repo}/commits/${sha}" --jq '.commit.message' 2>/dev/null | head -1)
          fi
          if [ -z "$msg" ] && [ -n "$repo" ]; then
            msg=$(gh api "repos/${repo}/commits?per_page=1" --jq '.[0].commit.message' 2>/dev/null | head -1)
          fi

          echo "$msg" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//'
        }

        append_last_commit_link() {
          local pkg="$1"
          local repo="$2"
          local sha="$3"
          if [ -n "$pkg" ] && [ -n "$repo" ] && [ -n "$sha" ] && [ ${#sha} -ge 7 ]; then
            echo "$pkg|https://github.com/${repo}/commit/${sha}" >> /tmp/commit_links.txt
          fi
        }

        changed_makefiles=$(git diff --name-only HEAD -- . ':(exclude).github/**' | grep -E '^[^/]+/Makefile$' || true)

        for makefile in $changed_makefiles; do
          [ -f "$makefile" ] || continue
          pkg=$(basename "$(dirname "$makefile")")

          new_ver=$(get_make_var "$makefile" "PKG_VERSION")
          [ -z "$new_ver" ] && new_ver=$(get_make_var "$makefile" "LUCI_VERSION")
          new_src_ver=$(get_make_var "$makefile" "PKG_SOURCE_VERSION")
          new_src_url=$(get_make_var "$makefile" "PKG_SOURCE_URL")
          repo=$(github_repo_from_url "$new_src_url")

          old_ver=""
          old_src_ver=""
          if git cat-file -e "HEAD:${makefile}" 2>/dev/null; then
            old_content=$(git show "HEAD:${makefile}")
            old_ver=$(printf '%s\n' "$old_content" | awk '/^PKG_VERSION[[:space:]]*:=|^PKG_VERSION[[:space:]]*=|^LUCI_VERSION[[:space:]]*:=|^LUCI_VERSION[[:space:]]*=/{sub("^[^=]*=","",$0);gsub(/^[[:space:]]+|[[:space:]]+$/,"",$0);print;exit}')
            old_src_ver=$(printf '%s\n' "$old_content" | awk '/^PKG_SOURCE_VERSION[[:space:]]*:=|^PKG_SOURCE_VERSION[[:space:]]*=/{sub("^[^=]*=","",$0);gsub(/^[[:space:]]+|[[:space:]]+$/,"",$0);print;exit}')
          fi

          if [ -n "$new_ver" ] && [ "$new_ver" != "$old_ver" ]; then
            echo "$pkg: update to $new_ver" >> /tmp/commit_messages.txt
            append_last_commit_link "$pkg" "$repo" "$new_src_ver"
            continue
          fi

          upstream_subject=""
          if [ -n "$new_src_ver" ] && [ "$new_src_ver" != "$old_src_ver" ]; then
            upstream_subject=$(fetch_upstream_subject "$repo" "$new_src_ver")
          fi
          [ -z "$upstream_subject" ] && upstream_subject=$(fetch_upstream_subject "$repo" "$new_src_ver")

          if [ -n "$upstream_subject" ]; then
            echo "$pkg: $upstream_subject" >> /tmp/commit_messages.txt
          else
            echo "$pkg: sync upstream" >> /tmp/commit_messages.txt
          fi
          append_last_commit_link "$pkg" "$repo" "$new_src_ver"
        done

        if [ ! -s /tmp/commit_messages.txt ] && git diff --name-only HEAD -- . ':(exclude).github/**' | grep . >/dev/null 2>&1; then
          git diff --name-only HEAD -- . ':(exclude).github/**' \
            | awk -F/ 'NF>1{print $1}' \
            | sort -u \
            | while read -r pkg; do
                [ -n "$pkg" ] && [ "$pkg" != "commit" ] && echo "$pkg: sync upstream" >> /tmp/commit_messages.txt
              done
        fi

    - name: Upload
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      run: |
        cd $GITHUB_WORKSPACE/${{matrix.target}}
        if git status --porcelain | grep .; then
          commit_body=""
          if [ -s /tmp/commit_messages.txt ]; then
            count=$(wc -l < /tmp/commit_messages.txt)
            join_with_comma() {
              awk 'BEGIN{ORS=""} {if (NR>1) printf(", "); printf("%s", $0)} END{print ""}' "$1"
            }
            if [ "$count" -eq 1 ]; then
              commit_msg=$(head -1 /tmp/commit_messages.txt)
            elif [ "$count" -le 3 ]; then
              commit_msg=$(join_with_comma /tmp/commit_messages.txt)
            else
              head -3 /tmp/commit_messages.txt > /tmp/commit_messages_top3.txt
              first3=$(join_with_comma /tmp/commit_messages_top3.txt)
              commit_msg="$first3 and $((count-3)) more packages"
            fi
          else
            commit_msg="sync: misc package updates"
          fi

          if [ -s /tmp/commit_links.txt ]; then
            sort -u /tmp/commit_links.txt > /tmp/commit_links_unique.txt
            while IFS='|' read -r pkg url; do
              [ -n "$pkg" ] && [ -n "$url" ] || continue
              if [ -n "$commit_body" ]; then
                commit_body="$commit_body\n\n"
              fi
              commit_body="$commit_body$pkg:\nlast commit: $url"
            done < /tmp/commit_links_unique.txt
          fi

          git add .
          if [ -n "$commit_body" ]; then
            git commit -m "$commit_msg" -m "$(printf '%b' "$commit_body")"
          else
            git commit -m "$commit_msg"
          fi
          git push --quiet "https://${{ secrets.ACCESS_TOKEN }}@github.com/kenzok8/small.git" HEAD:master
        else
          echo "nothing to commit"
          exit 0
        fi || exit 0

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      continue-on-error: true
      with:
        retain_days: 1
        keep_minimum_runs: 1
